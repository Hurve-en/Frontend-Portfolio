<!-- Page structure and UI layout -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Microblog — Minimal</title>
    <meta
      name="description"
      content="A minimal microblog app (client-side) with localStorage persistence and favorites."
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="Microblog.css" />

    <!-- Script -->
    <script src="Microblog.js" defer></script>
  </head>
  <body>
    <div class="app">
      <!-- Toast notifications -->
      <div
        id="toastContainer"
        class="toast-container"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <!-- Header -->
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true">✨</div>
          <div>
            <div class="title">Microblog</div>
            <div class="subtitle muted">Your minimal thoughts</div>
          </div>
        </div>

        <div class="header-actions">
          <div class="search-wrap">
            <input
              id="searchInput"
              type="search"
              placeholder="Search posts..."
              aria-label="Search posts"
            />
          </div>

          <div class="actions-right">
            <select id="categoryFilter" aria-label="Filter by category">
              <option value="">All categories</option>
            </select>

            <button
              id="favoritesToggle"
              class="btn icon-btn"
              title="Show only favorites"
              aria-pressed="false"
            >
              ♡
            </button>

            <button
              id="themeBtn"
              class="btn icon-btn"
              aria-pressed="false"
              title="Toggle theme"
            >
              ◐
            </button>
          </div>
        </div>
      </header>

      <main class="layout">
        <!-- Profile Sidebar -->
        <aside class="sidebar" id="sidebar" aria-label="Profile sidebar">
          <div class="profile-card">
            <div class="avatar" aria-hidden="true">🙂</div>
            <div class="profile-info">
              <div class="username" contenteditable="true" id="username">
                You
              </div>
              <div class="bio muted" id="bio">A minimal microblogger</div>
            </div>
          </div>

          <div class="stats">
            <div>
              <strong id="postCount">0</strong>
              <div class="muted">posts</div>
            </div>
            <div>
              <strong id="favCount">0</strong>
              <div class="muted">favorites</div>
            </div>
          </div>

          <div class="sidebar-actions">
            <button id="composeBtn" class="btn primary">Compose</button>
            <button id="exportBtn" class="btn secondary">Export</button>
            <button id="importBtn" class="btn secondary">Import</button>
            <input
              id="importInput"
              type="file"
              accept="application/json"
              class="visually-hidden"
            />
          </div>
        </aside>

        <!-- Main column -->
        <section class="main-col">
          <!-- Compose box -->
          <div class="compose-card" id="composeCard">
            <textarea
              id="composeTxt"
              maxlength="300"
              placeholder="What's on your mind? (max 300 chars)"
              aria-label="Compose post"
            ></textarea>

            <div class="compose-footer">
              <div class="compose-left">
                <div
                  class="category-picker"
                  id="categoryPicker"
                  role="listbox"
                  aria-label="Pick category"
                >
                  <!-- categories injected -->
                </div>
                <div class="char-counter" id="charCounter">0 / 300</div>
              </div>

              <div class="compose-right">
                <button id="cancelBtn" class="btn secondary hidden">
                  Cancel
                </button>
                <button id="postBtn" class="btn primary">Post</button>
              </div>
            </div>
          </div>

          <!-- Empty state -->
          <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">📝</div>
            <div class="empty-title">No posts yet</div>
            <div class="empty-text">
              Start by writing your first thought above
            </div>
          </div>

          <!-- Post feed -->
          <div id="feed" class="feed" aria-live="polite" aria-label="Post feed">
            <!-- posts injected here -->
          </div>

          <!-- Scroll to top -->
          <button
            id="scrollTop"
            class="btn circle hidden"
            title="Scroll to top"
            aria-label="Scroll to top"
          >
            ↑
          </button>
        </section>
      </main>

      <!-- Delete confirmation modal -->
      <div
        id="modalOverlay"
        class="modal-overlay hidden"
        role="dialog"
        aria-modal="true"
        aria-hidden="true"
        aria-labelledby="modalTitle"
      >
        <div class="modal">
          <div class="modal-header">
            <h2 id="modalTitle">Delete post?</h2>
          </div>
          <div class="modal-body">
            <p>This action cannot be undone.</p>
          </div>
          <div class="modal-actions">
            <button id="cancelDelete" class="btn secondary">Cancel</button>
            <button id="confirmDelete" class="btn danger">Delete</button>
          </div>
        </div>
      </div>

      <!-- small file import helper (invisible) -->
      <input
        id="fileImport"
        type="file"
        accept="application/json"
        class="visually-hidden"
      />
    </div>
  </body>
</html>
