<!-- 
  Journal App - HTML Structure
  
  This file contains the main page structure and layout:
  - Header with greeting, date, and action buttons
  - Left sidebar: search, filters, and entries list
  - Right panel: editor for creating/editing entries
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Daily Journal — Mindful Journaling</title>
    <meta
      name="description"
      content="A calm, accessible daily journal app with mood tagging, search, and PDF export."
    />

    <!-- Styles -->
    <link rel="stylesheet" href="Journal_App.css" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- jsPDF for PDF export (deferred) -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
      defer
    ></script>
    <!-- dayjs (optional) -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.11/dayjs.min.js"
      defer
    ></script>
    <!-- App script (deferred) -->
    <script src="Journal_App.js" defer></script>
  </head>
  <body data-theme="light">
    <div
      id="app"
      class="app-shell"
      role="application"
      aria-label="Minimalist Journal App"
    >
      <!-- Header -->
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true">📝</div>
          <div>
            <h1 id="greeting" class="headline">Good morning</h1>
            <p id="todayDate" class="muted">—</p>
          </div>
        </div>

        <div class="header-actions">
          <button id="newEntryBtn" class="btn-primary" title="Create new entry">
            + New Entry
          </button>
          <button
            id="exportAllBtn"
            class="btn-ghost"
            title="Export all entries"
          >
            PDF Export
          </button>
          <button id="importBtn" class="btn-ghost" title="Import backup file">
            Import
          </button>
          <input
            id="importInput"
            type="file"
            accept="application/json"
            class="visually-hidden"
          />
          <button id="downloadJsonBtn" class="btn-ghost" title="Backup entries">
            Backup
          </button>
          <button
            id="themeBtn"
            class="btn-icon"
            aria-pressed="false"
            title="Toggle dark/light mode"
          >
            🌗
          </button>
        </div>
      </header>

      <main class="layout" id="layoutRoot">
        <!-- Left Sidebar: Entries List -->
        <aside class="panel list-panel" aria-label="Journal entries list">
          <!-- Search -->
          <div class="panel-row">
            <input
              id="searchInput"
              type="search"
              placeholder="Search entries…"
              aria-label="Search journal entries"
            />
          </div>

          <!-- Filters -->
          <div class="panel-row filters">
            <select id="quickFilter" aria-label="Quick filter options">
              <option value="all">All entries</option>
              <option value="today">Today</option>
              <option value="7days">Last 7 days</option>
              <option value="month">This month</option>
            </select>

            <input
              id="dateFrom"
              type="date"
              aria-label="Filter from date"
              title="Start date for filtering"
            />
            <input
              id="dateTo"
              type="date"
              aria-label="Filter to date"
              title="End date for filtering"
            />
          </div>

          <!-- Mood Filters -->
          <div class="mood-filters" aria-label="Filter by mood">
            <!-- Generated by JavaScript -->
          </div>

          <!-- Entries List -->
          <div
            id="entriesList"
            class="entries-list"
            aria-live="polite"
            aria-label="Journal entries"
          ></div>
        </aside>

        <!-- Right Panel: Editor & Detail View -->
        <section
          class="panel editor-panel"
          aria-label="Entry editor and viewer"
        >
          <!-- Header with title and actions -->
          <div class="editor-header">
            <h2 class="editor-title">New Entry</h2>
            <div class="editor-actions">
              <button id="saveBtn" class="btn-primary" title="Save entry">
                Save
              </button>
              <button id="cancelBtn" class="btn-ghost" title="Cancel editing">
                Cancel
              </button>
              <button
                id="deleteBtn"
                class="btn-danger"
                title="Delete this entry"
              >
                Delete
              </button>
              <button
                id="exportEntryBtn"
                class="btn-ghost"
                title="Export entry as PDF"
              >
                Export
              </button>
            </div>
          </div>

          <!-- Editor Form -->
          <form id="entryForm" class="entry-form" novalidate>
            <!-- Title -->
            <div>
              <label for="titleInput" class="label">Title</label>
              <input
                id="titleInput"
                type="text"
                placeholder="Give your entry a title…"
                autocomplete="off"
              />
            </div>

            <!-- Date, Time, and Mood -->
            <div class="row">
              <div>
                <label for="dateInput" class="label">Date & Time</label>
                <input id="dateInput" type="datetime-local" />
              </div>

              <div>
                <label for="moodSelector" class="label">Mood</label>
                <div
                  id="moodSelector"
                  class="mood-selector"
                  role="listbox"
                  aria-label="Select your mood"
                ></div>
              </div>
            </div>

            <!-- Tags -->
            <div>
              <label for="tagsInput" class="label">Tags</label>
              <input
                id="tagsInput"
                type="text"
                placeholder="reflection, work, gratitude…"
              />
            </div>

            <!-- Body -->
            <div>
              <label for="bodyInput" class="label">Entry</label>
              <textarea
                id="bodyInput"
                placeholder="Write your thoughts here…"
              ></textarea>
            </div>

            <!-- Meta Row -->
            <div class="meta-row">
              <div id="wordCount" class="small">0 words • 0 chars</div>
              <div class="small">
                Auto-save: <span id="autoSaveStatus">off</span>
              </div>
            </div>

            <!-- Form Actions (Bottom) -->
            <div style="display: flex; gap: var(--space-md)">
              <button id="saveBtnBottom" class="btn-primary" style="flex: 1">
                Save
              </button>
              <button id="cancelBtnBottom" class="btn-ghost" style="flex: 1">
                Cancel
              </button>
            </div>
          </form>

          <!-- Detail View (Read-only) -->
          <article
            id="detailView"
            class="detail-view hidden"
            aria-live="polite"
          >
            <header>
              <h2 id="detailTitle" class="detail-title"></h2>
              <p id="detailMeta" class="detail-meta"></p>
            </header>
            <div id="detailBody" class="detail-body"></div>
            <p id="detailTags" class="detail-tags"></p>
          </article>
        </section>
      </main>

      <!-- Toast -->
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>
  </body>
</html>
