<!doctype html>
<!-- This is the main HTML document for the Flashcard app -->
<html lang="en">
  <head>
    <!-- Meta tags for character encoding and responsive design -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title of the page -->
    <title>FlashCards — Smart Paste</title>
    <!-- Link to the CSS stylesheet -->
    <link rel="stylesheet" href="flashcard.css" />
  </head>
  <body>
    <!-- Main container for the entire app -->
    <div class="app">
      <!-- Input screen where users paste their questions and answers -->
      <div class="screen active" id="s-input">
        <!-- Top bar with logo -->
        <div class="top-bar">
          <div>
            <div class="logo-sub">smart paste</div>
            <div class="logo">Flash<span>·</span>Cards</div>
          </div>
        </div>

        <!-- Hint text explaining supported formats -->
        <div class="format-hint">
          📋 <strong>Paste anything — one big block of text.</strong><br />
          Supported formats: &nbsp;<strong>Q: … &nbsp;A: …</strong>
          &nbsp;·&nbsp; <strong>1. Question↵Answer</strong> &nbsp;·&nbsp;
          <strong>Question?↵Answer.</strong><br />
          Mixed or messy text is fine. The parser figures it out automatically.
        </div>

        <!-- Textarea for pasting content -->
        <textarea
          class="paste-area"
          id="pasteArea"
          placeholder="Paste your questions and answers here…

Example formats:

Q: What is photosynthesis?
A: The process plants use to convert sunlight into energy.

Q: What year did World War II end?
A: 1945

1. Capital of Japan?
Tokyo

What is the powerhouse of the cell?
The mitochondria."
        ></textarea>

        <!-- Buttons for clearing input and parsing -->
        <div class="input-actions">
          <button class="btn btn-clear" onclick="clearInput()">Clear</button>
          <button
            class="btn btn-parse"
            id="parseBtn"
            onclick="parseInput()"
            disabled
          >
            Parse Cards →
          </button>
        </div>
      </div>

      <!-- Preview screen to review parsed cards -->
      <div class="screen" id="s-preview">
        <!-- Header with title and card count -->
        <div class="preview-header">
          <div class="preview-title">Review Cards</div>
          <div class="badge" id="previewBadge">0 cards</div>
        </div>

        <!-- List of previewed cards -->
        <div class="preview-list" id="previewList"></div>

        <!-- Footer buttons to go back or start studying -->
        <div class="preview-footer">
          <button class="btn btn-back-inp" onclick="goTo('s-input')">
            ← Edit Text
          </button>
          <button class="btn btn-study" onclick="startStudy()">
            Start Studying →
          </button>
        </div>
      </div>

      <!-- Study screen for flipping through cards -->
      <div class="screen" id="s-study">
        <!-- Top bar with navigation and progress -->
        <div class="study-top">
          <button class="btn-sm" onclick="goTo('s-preview')">← Cards</button>
          <div class="progress-wrap">
            <div class="progress-bar">
              <div class="progress-fill" id="progFill" style="width: 0%"></div>
            </div>
            <div class="progress-txt" id="progTxt">1 of 1</div>
          </div>
          <button class="btn-sm" onclick="shuffle()">⇄ Shuffle</button>
        </div>

        <!-- Flippable card area -->
        <div class="scene" id="scene" onclick="flip()">
          <div class="flipper" id="flipper">
            <!-- Front of the card (question) -->
            <div class="face face-front">
              <div class="face-tag">Question</div>
              <div class="face-text" id="qText"></div>
              <div class="flip-hint">tap to reveal answer</div>
            </div>
            <!-- Back of the card (answer) -->
            <div class="face face-back">
              <div class="face-tag">Answer</div>
              <div class="face-text" id="aText"></div>
              <div class="flip-hint">tap to flip back</div>
            </div>
          </div>
        </div>

        <!-- Navigation buttons for previous and next -->
        <div class="nav-row">
          <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">
            ← Prev
          </button>
          <button class="nav-btn" id="nextBtn" onclick="navigate(1)">
            Next →
          </button>
        </div>
      </div>
    </div>

    <!-- Link to the JavaScript file -->
    <script src="flashcard.js"></script>
  </body>
</html>
