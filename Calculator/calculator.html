<!-- Simple comment: This file handles the page structure. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Modern Calculator Pro</title>

    <!-- Set theme before CSS loads to prevent flashing -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("calc_theme");
          if (theme === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>

    <!-- Modular CSS Files -->
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body>
    <main class="calculator" role="application" aria-label="Calculator Pro">
      <header class="topbar">
        <div>
          <div class="brand">Calculator Pro</div>
          <div class="tagline">Modern & Fast</div>
        </div>
        <div class="theme-area">
          <button
            class="history-btn"
            id="historyBtn"
            title="Show history"
            aria-label="Show calculation history"
          >
            <span class="history-icon">📋</span>
          </button>
          <label class="switch" title="Toggle dark theme">
            <input
              id="themeToggle"
              type="checkbox"
              aria-label="Toggle dark theme"
            />
            <span class="slider"></span>
          </label>
        </div>
      </header>

      <div id="historyPanel" class="history-panel" hidden>
        <div class="history-header">
          <h3>History</h3>
          <button
            id="clearHistoryBtn"
            class="clear-history"
            title="Clear history"
          >
            ✕
          </button>
        </div>
        <div id="historyList" class="history-list"></div>
      </div>

      <section
        class="display"
        aria-live="polite"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div id="secondary" class="secondary" aria-label="Last result">—</div>
        <div id="primary" class="primary" aria-label="Current expression">
          0
        </div>
      </section>

      <section class="keys" role="group" aria-label="Calculator keys">
        <button class="key func" data-action="clear" aria-label="Clear">
          C
        </button>
        <button class="key func" data-action="back" aria-label="Backspace">
          ⌫
        </button>
        <button class="key func" data-action="percent" aria-label="Percent">
          %
        </button>
        <button class="key op" data-value="/" aria-label="Divide">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key op" data-value="*" aria-label="Multiply">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key op" data-value="-" aria-label="Subtract">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key op" data-value="+" aria-label="Add">+</button>

        <button class="key zero" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key equal" data-action="equals" aria-label="Equals">
          =
        </button>

        <button class="key par" data-value="(" aria-label="Open parenthesis">
          (
        </button>
        <button class="key par" data-value=")" aria-label="Close parenthesis">
          )
        </button>
      </section>

      <footer class="hint">
        💡 Tip: Use keyboard for faster input • Press Esc to clear
      </footer>
    </main>

    <div id="toast" class="toast"></div>

    <!-- Modular JavaScript Files -->
    <script src="assets/js/calculator.js" defer></script>
    <script src="assets/js/ui.js" defer></script>
    <script src="assets/js/theme.js" defer></script>
    <script src="assets/js/history.js" defer></script>
    <script src="assets/js/app.js" defer></script>
  </body>
</html>
